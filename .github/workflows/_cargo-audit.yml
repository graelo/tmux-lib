# Reusable workflow: dependency audit via cargo-deny and cargo-pants.
#
# Local (standalone):
#   act workflow_call -W .github/workflows/_cargo-audit.yml

name: Cargo Audit

on:
  workflow_call:

permissions: {}

jobs:
  cargo-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Cache crates
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-stable-audit-${{ hashFiles('Cargo.toml') }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-deny@0.19.8

      - name: Security – cargo deny
        run: cargo deny check

      - name: Security – cargo pants
        run: |
          cargo install --locked cargo-pants || command -v cargo-pants
          cargo pants
