# Reusable workflow: dependency audit via cargo-deny and cargo-pants.
#
# Local (standalone):
#   act workflow_call -W .github/workflows/_cargo-audit.yml

name: Cargo Audit

on:
  workflow_call:

permissions: {}

jobs:
  cargo-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Cache crates
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        continue-on-error: false
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-stable-audit-${{ hashFiles('Cargo.toml') }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@7572810d7dd469b651bb7793945692cf78da5dd7 # v2.85.0
        with:
          tool: cargo-deny@0.19.8

      - name: Security – cargo deny
        run: cargo deny check

      - name: Security – cargo pants
        run: |
          cargo install --locked cargo-pants || command -v cargo-pants
          cargo pants
